<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Doguinhos</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }

        h1 { color: #333; }

        #dog-container {
            margin: 20px 0;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
            display: none; /* Escondido até carregar */
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #45a049;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🐶 Doguinho Aleatório</h1>
        
        <div id="dog-container">
            <div id="loader" class="loader"></div>
            <img id="dog-image" src="" alt="Um cachorro fofo aparecerá aqui">
        </div>

        <button id="btn-next">Ver outro doguinho!</button>
    </div>

    <script>
        const btn = document.getElementById('btn-next');
        const img = document.getElementById('dog-image');
        const loader = document.getElementById('loader');

        async function fetchDog() {
            // Mostrar loader e esconder imagem antiga
            loader.style.display = 'block';
            img.style.display = 'none';

            try {
                const response = await fetch('https://dog.ceo/api/breeds/image/random');
                const data = await response.json();
                
                // Definir o novo link da imagem
                img.src = data.message;
                
                // Mostrar a imagem apenas quando ela terminar de carregar de fato
                img.onload = () => {
                    loader.style.display = 'none';
                    img.style.display = 'block';
                };

            } catch (error) {
                console.error("Erro ao buscar o cachorro:", error);
                alert("Ops! Ocorreu um erro ao buscar o doguinho.");
                loader.style.display = 'none';
            }
        }

        // Carregar um cachorro assim que a página abrir
        window.onload = fetchDog;

        // Evento do clique do botão
        btn.addEventListener('click', fetchDog);
    </script>

</body>
</html>
</body>
</html>
